* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }

:root {
  --bg:        #1c1033;

  --bg4:       #362560;

  --green:     #34d399;
  --red:       #f87171;
  --text:      #ffffff;
  --text2:     #c4b5fd;
  --text3:     #7c6fa0;
  --border:    rgba(139,92,246,0.3);
  --border-b:  rgba(59,130,246,0.35);
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* Фон */
.bg-glow {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 70% 40% at 50% 0%, rgba(139,92,246,0.25) 0%, transparent 70%),
    radial-gradient(ellipse 50% 30% at 10% 80%, rgba(59,130,246,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 40% 25% at 90% 60%, rgba(139,92,246,0.1) 0%, transparent 60%);
}

.app { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; width: 100%; }

/* HEADER */
.header {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  background: rgba(28,16,51,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.logo {
  font-family: 'Space Mono', monospace;
  font-size: 19px; font-weight: 700;
  letter-spacing: 2px;
  color: var(--text);
}
.logo b { color: var(--blue2); }

.user-info { display: flex; align-items: center; gap: 8px; }
.user-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, var(--purple), var(--blue));
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  box-shadow: 0 0 12px rgba(139,92,246,0.5);
}
.user-name { font-size: 14px; font-weight: 700; color: var(--text2); }

.balance-bar {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  padding: 12px 16px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
